name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14   # Runner Apple Silicon — requiere macOS 14+ para Flutter 3.41+
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          brew install libffi openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix libffi)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix libffi)/lib -L$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix libffi)/include -I$(brew --prefix openssl@3)/include" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install flet==0.84.0 flet-web==0.84.0 supabase fpdf2 openpyxl Pillow matplotlib

      - name: Build macOS app
        run: flet build macos --verbose
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PIP_PREFER_BINARY: "1"
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/SicavERP.app"
          DMG_NAME="SicavERP-macOS-${{ github.ref_name || 'dev' }}.dmg"

          # Carpeta temporal para armar el contenido del DMG
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/

          # Symlink a Applications para arrastrar y soltar
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "SICAV ERP" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            -o "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SicavERP-macOS-dmg
          path: ${{ env.DMG_NAME }}
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
