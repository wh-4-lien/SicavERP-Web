name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-13   # Runner Intel — compatible con iMac 2012/2015
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Python dependencies
        run: pip install flet==0.84.0 flet-web==0.84.0 supabase fpdf2 openpyxl Pillow matplotlib

      - name: Build macOS app
        run: flet build macos --verbose
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r SicavERP-macOS.zip SicavERP.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SicavERP-macOS
          path: build/macos/Build/Products/Release/SicavERP-macOS.zip
          retention-days: 30

      - name: Create GitHub Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/SicavERP-macOS.zip
          name: ${{ github.ref_name }}
          generate_release_notes: true
